<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교사 대시보드</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #1a1a1a; color: #e0e0e0; margin: 0; padding: 2rem; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #444; padding-bottom: 1rem; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        h1 { color: #ffffff; margin: 0; }
        .controls { display: flex; gap: 0.8rem; flex-wrap: wrap; align-items: center; }
        .controls button { color: white; border: 1px solid #555; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-size: 1rem; background-color: #333; transition: background-color 0.2s, border-color 0.2s; }
        .controls button.active { background-color: #7289da; border-color: #7289da; font-weight: bold; }
        .controls button:hover:not(.active) { background-color: #444; }
        #clear-btn { background-color: #c0392b; border: 1px solid #c0392b; }
        #clear-btn:hover { background-color: #e74c3c; border-color: #e74c3c; }
        #logout-btn { background-color: #555; border: none; }
        #logout-btn:hover { background-color: #777; }
        
        .view-container { display: none; }
        .view-container.active { display: block; }
        
        .submission-card { background-color: #2c2c2c; 
            border: 1px solid #444; 
            border-radius: 8px; 
            margin-bottom: 1.5rem; 
            overflow: hidden; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.5s forwards;
        }
        .card-main-content { padding: 1.5rem; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; border-bottom: 1px solid #444; padding-bottom: 1rem; }
        .student-info { font-size: 1.2rem; font-weight: bold; display: flex; align-items: center; gap: 0.8rem; }
        .student-info .id { color: #87ceeb; }
        .class-badge { background-color: #4f545c; color: #e0e0e0; padding: 0.3rem 0.7rem; border-radius: 12px; font-size: 0.8rem; font-weight: normal; }
        .score { font-size: 2rem; font-weight: bold; }
        .score.high { color: #4CAF50; }
        .score.low { color: #F44336; }
        .card-body p { margin: 0.8rem 0; line-height: 1.6; }
        .card-body strong { color: #b0b0b0; display: inline-block; min-width: 150px; }
        .timestamp { font-size: 0.8rem; color: #888; margin-top: 1rem; }
        .feedback-section { background-color: #383838; padding: 1rem 1.5rem; border-top: 1px solid #555; }
        .feedback-section strong { color: #ffffff; display: block; margin-bottom: 0.5rem; }
        .feedback-section p { margin: 0; line-height: 1.6; color: #d0d0d0; white-space: pre-wrap; }
        .student-feedback-section { background-color: #2a2a2a; padding: 1rem 1.5rem; border-top: 1px solid #555; }
        .student-feedback-section strong { color: #87ceeb; display: block; margin-bottom: 0.5rem; }
        .student-feedback-section p { margin: 0; line-height: 1.6; color: #d0d0d0; white-space: pre-wrap; }
        .empty-message { text-align: center; padding: 3rem; color: #888; font-size: 1.1rem; }
        .text-italic { font-style: italic; color: #a0d8ef; }
        .criteria-info { margin: 0.8rem 0; }
        .criteria-info strong { color: #ffa500; }
        
        /* ★★★ 말하기 전용 스타일 ★★★ */
        .audio-playback {
            width: 100%;
            margin-top: 10px;
        }
        
        /* ▼▼▼ [추가] 교수님 피드백 입력창 디자인 ▼▼▼ */
        .teacher-action-box {
            background-color: #232529;
            padding: 1.5rem;
            border-top: 1px solid #555;
            margin-top: 15px;
        }
        .teacher-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background-color: #40444b;
            border: 1px solid #555;
            color: #e0e0e0;
            border-radius: 5px;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
        }
        .check-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .check-btn:hover { background-color: #2ecc71; }
        .check-btn:disabled { background-color: #555; cursor: not-allowed; }
        .check-status {
            float: right;
            font-weight: bold;
            color: #2ecc71;
            display: none; 
            margin-top: 10px;
        }
        .check-status.visible { display: block; }
        /* ▲▲▲ [추가 끝] ▲▲▲ */

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }        

        /* <style> 태그 안에 아래 코드를 추가 또는 수정/대체해 주세요. */
        .score-container { 
            display: flex; 
            align-items: center; 
            gap: 1rem;
        }
        .score-value { 
            font-size: 2rem; 
            font-weight: bold; 
        }
        .rating-badge {
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 16px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        /* 기존 .score, .score.high, .score.low 스타일은 더 이상 필요 없으므로 삭제하셔도 됩니다. */

        /* [추가] 모달 스타일 */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 1000; }
        .modal-content { 
            background: #2c2f33; width: 90%; max-width: 400px; margin: 10% auto; padding: 30px; 
            border-radius: 10px; border: 1px solid #444; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .modal-input {
            width: 100%; padding: 12px; margin-bottom: 15px; background-color: #40444b;
            border: 1px solid #202225; color: #e0e0e0; border-radius: 5px; font-size: 1rem; box-sizing: border-box;
        }

    </style>
</head>
<body>
    <header>
        <h1>실시간 제출 현황</h1>
        <div class="controls">
            <button id="btn-translation" class="active" onclick="switchView('translation')">번역 퀴즈 결과</button>
            <button id="btn-comprehension" onclick="switchView('comprehension')">이해력 퀴즈 결과</button>
            <button id="btn-speaking" onclick="switchView('speaking')">말하기 퀴즈 결과</button>
            <button id="btn-roleplay" onclick="switchView('roleplay')">🎭 롤플레이 결과</button>
            <button id="clear-btn" onclick="clearCurrentView()">화면 지우기</button>
            <button onclick="location.href='/roleplay-admin'" style="background-color: #5b4bb5;">🎭 롤플레이 관리</button>
            <button onclick="location.href='/roleplay-session'" style="background-color: #b58b00;">📋 세션 관리</button>
            <button onclick="openManagerModal()" style="background-color: #444;">🔑 학생 관리</button>
            <button id="logout-btn" onclick="location.href='/teacher-logout'">로그아웃</button>
        </div>
    </header>

    <div id="translation-view" class="view-container active"></div>
    <div id="comprehension-view" class="view-container"></div>
    <div id="speaking-view" class="view-container"></div>
    <div id="roleplay-view" class="view-container"></div>

    <script>
        let currentView = 'translation';
        let lastTranslationId = 0;
        let lastComprehensionId = 0;
        let lastSpeakingId = 0;
        let currentTranslationPage = 1;
        let currentComprehensionPage = 1;
        let currentSpeakingPage = 1;
        let autoRefreshInterval = null;

        function switchView(viewType) {
            currentView = viewType;
            document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${viewType}`).classList.add('active');
            document.querySelectorAll('.view-container').forEach(container => container.classList.remove('active'));
            document.getElementById(`${viewType}-view`).classList.add('active');
            
            if (viewType === 'roleplay') {
                loadRoleplayEvaluations();
                return;
            }

            let currentPage = 1;
            if (viewType === 'translation') currentPage = currentTranslationPage;
            else if (viewType === 'comprehension') currentPage = currentComprehensionPage;
            else if (viewType === 'speaking') currentPage = currentSpeakingPage;
            
            loadSubmissions(viewType, currentPage, false);
        }

        function clearCurrentView() {
            const container = document.getElementById(`${currentView}-view`);
            container.innerHTML = '<p class="empty-message">화면이 초기화되었습니다.</p>';
            
            if (currentView === 'translation') {
                currentTranslationPage = 1;
                lastTranslationId = 0;
            } else if (currentView === 'comprehension') {
                currentComprehensionPage = 1;
                lastComprehensionId = 0;
            } else if (currentView === 'speaking') {
                currentSpeakingPage = 1;
                lastSpeakingId = 0;
            }
            
            console.log(`${currentView} 뷰의 화면이 초기화되었습니다.`);
        }

        async function loadSubmissions(quizType, page = 1, isAutoRefresh = false) {
            const container = document.getElementById(`${quizType}-view`);
            
            if (!isAutoRefresh) {
                container.innerHTML = '<p class="empty-message">데이터를 불러오는 중...</p>';
            }
            
            try {
                const response = await fetch(`/api/get-submissions?quiz_type=${quizType}&page=${page}&class_name=all`);
                if (!response.ok) {
                    if (response.status === 401) window.location.href = '/teacher-login';
                    throw new Error(`서버 응답 오류: ${response.status}`);
                }
                
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    let lastId = 0;
                    if (quizType === 'translation') lastId = lastTranslationId;
                    else if (quizType === 'comprehension') lastId = lastComprehensionId;
                    else if (quizType === 'speaking') lastId = lastSpeakingId;
                    
                    const itemsToDisplay = isAutoRefresh 
                        ? data.items.filter(item => item.id > lastId)
                        : data.items;
                    
                    if (itemsToDisplay.length > 0) {
                        const emptyMessage = container.querySelector('.empty-message');
                        if (emptyMessage) {
                            container.innerHTML = '';
                        }
                        
                        itemsToDisplay.forEach(item => {
                            const card = createSubmissionCard(item, quizType);
                            if (isAutoRefresh) {
                                container.prepend(card);
                            } else {
                                container.appendChild(card);
                            }
                        });
                    }
                    
                    const maxId = Math.max(...data.items.map(item => item.id));
                    if (quizType === 'translation') {
                        lastTranslationId = Math.max(lastTranslationId, maxId);
                        if (!isAutoRefresh) currentTranslationPage = page;
                    } else if (quizType === 'comprehension') {
                        lastComprehensionId = Math.max(lastComprehensionId, maxId);
                        if (!isAutoRefresh) currentComprehensionPage = page;
                    } else if (quizType === 'speaking') {
                        lastSpeakingId = Math.max(lastSpeakingId, maxId);
                        if (!isAutoRefresh) currentSpeakingPage = page;
                    }
                    
                    if (!isAutoRefresh && data.total_pages > 1) {
                        addPaginationButtons(container, quizType, data.current_page, data.total_pages);
                    }
                    
                } else {
                    if (!isAutoRefresh && container.children.length === 0) {
                        container.innerHTML = '<p class="empty-message">아직 제출된 결과가 없습니다.</p>';
                    }
                }
            } catch (error) {
                console.error(`${quizType} 제출물 로딩 오류:`, error);
                if (!isAutoRefresh) {
                    container.innerHTML = `<p class="empty-message" style="color: #e74c3c;">데이터를 불러오는 데 실패했습니다.</p>`;
                }
            }
        }

        function addPaginationButtons(container, quizType, currentPage, totalPages) {
            currentPage = parseInt(currentPage);
            totalPages = parseInt(totalPages);

            const existingPagination = container.querySelector('.pagination-container');
            if (existingPagination) {
                existingPagination.remove();
            }

            const paginationDiv = document.createElement('div');
            paginationDiv.className = 'pagination-container';
            paginationDiv.style.cssText = 'text-align: center; margin: 2rem 0; padding: 1rem; display: flex; justify-content: center; align-items: center; gap: 0.5rem;';

            if (currentPage > 1) {
                const prevBtn = document.createElement('button');
                prevBtn.textContent = '←';
                prevBtn.style.cssText = 'padding: 0.5rem 1rem; background: #555; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1.2rem;';
                prevBtn.onmouseover = () => prevBtn.style.background = '#666';
                prevBtn.onmouseout = () => prevBtn.style.background = '#555';
                prevBtn.onclick = () => loadSubmissions(quizType, currentPage - 1, false);
                paginationDiv.appendChild(prevBtn);
            }

            const maxVisiblePages = 10;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);

            if (endPage - startPage < maxVisiblePages - 1) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }

            if (startPage > 1) {
                const firstBtn = document.createElement('button');
                firstBtn.textContent = '1';
                firstBtn.style.cssText = 'padding: 0.5rem 0.8rem; background: #555; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem;';
                firstBtn.onmouseover = () => firstBtn.style.background = '#666';
                firstBtn.onmouseout = () => firstBtn.style.background = '#555';
                firstBtn.onclick = () => loadSubmissions(quizType, 1, false);
                paginationDiv.appendChild(firstBtn);

                const dots = document.createElement('span');
                dots.textContent = '...';
                dots.style.cssText = 'color: #888; padding: 0 0.5rem;';
                paginationDiv.appendChild(dots);
            }

            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.textContent = i;
                
                if (i === currentPage) {
                    pageBtn.style.cssText = `
                        padding: 0.7rem 1.1rem; 
                        background: #7289da; 
                        color: white; 
                        border: 2px solid white; 
                        border-radius: 4px; 
                        cursor: pointer; 
                        font-size: 1.4rem; 
                        font-weight: bold;
                        transform: scale(1.15);
                        box-shadow: 0 0 10px rgba(114, 137, 218, 0.5);
                    `;
                } else {
                    pageBtn.style.cssText = 'padding: 0.5rem 0.8rem; background: #555; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem;';
                    pageBtn.onmouseover = () => pageBtn.style.background = '#666';
                    pageBtn.onmouseout = () => pageBtn.style.background = '#555';
                }
                
                pageBtn.onclick = () => loadSubmissions(quizType, i, false);
                paginationDiv.appendChild(pageBtn);
            }

            if (endPage < totalPages) {
                const dots = document.createElement('span');
                dots.textContent = '...';
                dots.style.cssText = 'color: #888; padding: 0 0.5rem;';
                paginationDiv.appendChild(dots);

                const lastBtn = document.createElement('button');
                lastBtn.textContent = totalPages;
                lastBtn.style.cssText = 'padding: 0.5rem 0.8rem; background: #555; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem;';
                lastBtn.onmouseover = () => lastBtn.style.background = '#666';
                lastBtn.onmouseout = () => lastBtn.style.background = '#555';
                lastBtn.onclick = () => loadSubmissions(quizType, totalPages, false);
                paginationDiv.appendChild(lastBtn);
            }

            if (currentPage < totalPages) {
                const nextBtn = document.createElement('button');
                nextBtn.textContent = '→';
                nextBtn.style.cssText = 'padding: 0.5rem 1rem; background: #555; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1.2rem;';
                nextBtn.onmouseover = () => nextBtn.style.background = '#666';
                nextBtn.onmouseout = () => nextBtn.style.background = '#555';
                nextBtn.onclick = () => loadSubmissions(quizType, currentPage + 1, false);
                paginationDiv.appendChild(nextBtn);
            }

            container.appendChild(paginationDiv);
        }

        function createSubmissionCard(item, quizType) {
            const card = document.createElement('div');
            card.className = 'submission-card';

            const analysis = item.ai_analysis_json || {};
            let scoreValue, questionText, feedbackText;
            let cardBodyExtraHtml = '', criteriaHtml = '', studentFeedbackHtml = '';
            let teacherActionHtml = ''; // ★ 추가

            // --- 퀴즈 타입에 따라 점수 추출 ---
            if (quizType === 'translation') {
                scoreValue = item.score;
            } else if (quizType === 'comprehension' || quizType === 'speaking') {
                scoreValue = analysis.score;
            }
            
            // ★★★ 핵심 변경점: 점수를 기반으로 평가 상세 정보 가져오기 ★★★
            const scoreDisplay = isNaN(parseFloat(scoreValue)) ? 'N/A' : parseFloat(scoreValue).toFixed(1);
            // ★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★
            
            const koreanTranslation = analysis.student_answer_korean_translation || '(번역 없음)';
            const vocabItalian = analysis.key_vocabularies_italian || [];
            const vocabKorean = analysis.key_vocabularies_korean_translation || [];
            
            let keywordsString = '';
            if (vocabItalian.length > 0) {
                keywordsString = vocabItalian.map((vocab, index) => 
                    `${vocab}(${vocabKorean[index] || '뜻 없음'})`
                ).join(', ');
            }

            const keywordsHtml = keywordsString 
                ? `<p><strong>핵심 어휘:</strong> ${keywordsString}</p>`
                : '';

            if (quizType === 'translation') {
                questionText = item.korean_sentence;
                feedbackText = analysis.evaluation_feedback || '(피드백 없음)';
                cardBodyExtraHtml = `
                    <p><strong>학생 답안 (원문):</strong> <span class="text-italic">${item.student_answer || '(답안 없음)'}</p>
                    <p><strong>학생 답안 (번역):</strong> <span class="text-italic">${koreanTranslation}</span></p>
                    ${keywordsHtml}
                `;
            } else if (quizType === 'comprehension') {
                questionText = item.korean_dialogue;
                feedbackText = analysis.evaluation || '(평가 없음)';
                const keyPoints = item.key_points || {};
                const targetVocabulary = keyPoints.target_vocabulary || [];
                const meaningPoints = keyPoints.meaning_points || [];
                const targetVocabString = targetVocabulary.length > 0 ? targetVocabulary.join(', ') : '(목표 어휘 없음)';
                const meaningPointsString = meaningPoints.length > 0 ? meaningPoints.join(', ') : '(문맥 문장 없음)';
                criteriaHtml = `<div class="criteria-info"><p><strong>목표 어휘:</strong> ${targetVocabString}</p><p><strong>문맥 문장:</strong> ${meaningPointsString}</p></div>`;
                cardBodyExtraHtml = `<p><strong>학생 답안 (원문):</strong> <span class="text-italic">${item.student_answer || '(답안 없음)'}</p><p><strong>학생 답안 (번역):</strong> <span class="text-italic">${koreanTranslation}</span></p>${keywordsHtml}`;
                const studentFeedbackItalian = analysis.feedback || '(피드백 없음)';
                studentFeedbackHtml = `
                    <div class="student-feedback-section">
                        <strong>학생이 받은 피드백 (AI):</strong>
                        <p>${studentFeedbackItalian}</p>   
                    </div>
                `;
                // ▼▼▼ [추가] 이해력 피드백 입력창 생성
                const savedFeedback = item.teacher_feedback || '';
                const checkStatus = item.is_checked ? 'visible' : '';
                teacherActionHtml = `
                    <div class="teacher-action-box">
                        <textarea id="fb-${item.id}" class="teacher-input" placeholder="학생에게 보낼 피드백을 입력하세요...">${savedFeedback}</textarea>
                        <button class="check-btn" onclick="saveFeedback(${item.id}, 'comprehension')">확인 및 피드백 저장</button>
                        <span id="status-${item.id}" class="check-status ${checkStatus}">✅ 확인됨 (Visto)</span>
                    </div>
                `;
            } else if (quizType === 'speaking') {
                questionText = item.situation_description || '(상황 없음)';
                feedbackText = analysis.evaluation || '(평가 없음)';
                const requiredExpression = item.required_expression || '(표현 없음)';
                const expectedAnswer = item.expected_korean_answer || '(예상 답변 없음)';
                const recognizedText = item.recognized_korean_text || '(인식 실패)';
                // ★★★ JSON 문자열을 배열로 파싱 ★★★
                let targetVocab = item.target_vocabulary || [];
                if (typeof targetVocab === 'string') {
                    try {
                        targetVocab = JSON.parse(targetVocab);
                    } catch (e) {
                        targetVocab = [];
                    }
                }
                const vocabUsage = analysis.vocabulary_usage || {};
                const targetVocabString = targetVocab.length > 0 ? targetVocab.join(', ') : '(목표 어휘 없음)';
                let vocabUsageHtml = '<ul style="margin: 0.5rem 0; padding-left: 1.5rem;">';
                for (const [vocab, info] of Object.entries(vocabUsage)) {
                    // Gate A/B/C 신 스키마 우선, 구 스키마(used) 폴백 처리
                    let usedIcon;
                    if (info.gate === 'A') {
                        usedIcon = '✅';
                    } else if (info.gate === 'B') {
                        usedIcon = '⚪';   // 미사용 (빠진 것)
                    } else if (info.gate === 'C') {
                        usedIcon = '❌';   // 의미 왜곡 오사용
                    } else if (typeof info.used === 'boolean') {
                        // 구 스키마 레코드 호환 (Gate 시스템 도입 이전 데이터)
                        usedIcon = info.used ? '✅' : '❌';
                    } else {
                        usedIcon = '❓';
                    }
                    // Gate C인 경우 학생이 실제로 쓴 어휘를 표시 (있으면)
                    const studentUsedSuffix = (info.gate === 'C' && info.student_used)
                        ? ` <span style="color:#cc6464;">(학생 사용: "${info.student_used}")</span>`
                        : '';
                    const note = info.note || '';
                    vocabUsageHtml += `<li>${usedIcon} <strong>${vocab}</strong>: ${note}${studentUsedSuffix}</li>`;
                }
                vocabUsageHtml += '</ul>';
                criteriaHtml = `<div class="criteria-info"><p><strong>표현:</strong> ${requiredExpression}</p><p><strong>예상 정답:</strong> ${expectedAnswer}</p><p><strong>목표 어휘:</strong> ${targetVocabString}</p></div>`;
                cardBodyExtraHtml = `<p><strong>AI 인식 텍스트:</strong> <span class="text-italic">${recognizedText}</span></p><p><strong>어휘 사용 현황:</strong></p>${vocabUsageHtml}<p><strong>🔊 음성 파일:</strong></p><audio controls class="audio-playback"><source src="${item.audio_file_url}" type="audio/mp4">브라우저가 오디오 재생을 지원하지 않습니다.</audio>`;
                const studentFeedbackItalian = analysis.feedback || '(피드백 없음)';
                studentFeedbackHtml = `
                    <div class="student-feedback-section">
                        <strong>학생이 받은 피드백 (AI):</strong>
                        <p>${studentFeedbackItalian}</p>
                    </div>`;
                // ▼▼▼ [추가] 말하기 피드백 입력창 생성
                const savedFeedback = item.teacher_feedback || '';
                const checkStatus = item.is_checked ? 'visible' : '';
                teacherActionHtml = `
                    <div class="teacher-action-box">
                        <textarea id="fb-${item.id}" class="teacher-input" placeholder="학생에게 보낼 피드백을 입력하세요...">${savedFeedback}</textarea>
                        <button class="check-btn" onclick="saveFeedback(${item.id}, 'speaking')">확인 및 피드백 저장</button>
                        <span id="status-${item.id}" class="check-status ${checkStatus}">✅ 확인됨 (Visto)</span>
                    </div>
                `;
            }
            
            const formattedDate = new Date(item.created_at).toLocaleString('ko-KR');

            card.innerHTML = `
                <div class="card-main-content">
                    <div class="card-header">
                        <div class="student-info">
                            <span>학생 ID: <span class="id">${item.student_id}</span></span>
                            <span class="text-italic" style="margin-left:4px; font-size:0.9em;">(${item.full_name || '이름 없음'})</span>
                            <span class="class-badge">${item.class_name || '반 없음'}</span>
                        </div>
                        
                        <div class="score-container">
                            <span class="score-value" style="color: ${item.rating_color || '#888'};">${scoreDisplay}</span>
                            <span class="rating-badge" style="background-color: ${item.rating_color || '#888'};">${item.rating_category || 'N/A'}</span>
                        </div>

                    </div>
                    <div class="card-body">
                        <p><strong>상황:</strong> ${questionText}</p>
                        ${criteriaHtml}
                        ${cardBodyExtraHtml}
                    </div>
                    <div class="timestamp">${formattedDate}</div>
                </div>
                ${studentFeedbackHtml}
                
                <div class="feedback-section">
                    <strong>AI 평가 (교수용):</strong>
                    <p>${feedbackText}</p>
                </div>
                ${teacherActionHtml}
            `;





            return card;
        }


        // ▼▼▼ [추가] 피드백 저장 통신 함수
        async function saveFeedback(id, type) {
            const feedbackText = document.getElementById(`fb-${id}`).value;
            const btn = document.querySelector(`#fb-${id} + button`);
            const statusSpan = document.getElementById(`status-${id}`);

            btn.textContent = '저장 중...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/save-teacher-feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ submission_id: id, quiz_type: type, feedback: feedbackText })
                });
                
                const result = await res.json();

                if (result.success) {
                    statusSpan.classList.add('visible');
                    btn.textContent = '저장 완료!';
                    setTimeout(() => {
                        btn.textContent = '확인 및 피드백 저장'; 
                        btn.disabled = false;
                    }, 1000);
                } else {
                    alert('저장 실패: ' + (result.error || 'Unknown error'));
                    btn.disabled = false;
                }
            } catch (e) {
                console.error(e);
                alert('서버 통신 오류');
                btn.disabled = false;
            }
        }
        // ▲▲▲ [추가 끝]

        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval); // 만약을 위해 기존 인터벌 정리

            autoRefreshInterval = setInterval(() => {
                // ★★★★★ 교수님의 아이디어 적용 ★★★★★
                // 오직 '번역' 탭이고, 1페이지에 있을 때만 자동 새로고침 실행
                if (currentView === 'translation' && currentTranslationPage === 1) {
                    loadSubmissions('translation', 1, true);
                }
            }, 2000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadSubmissions('translation', 1, false);
            startAutoRefresh();
        });

        // [추가] 학생 관리 모달 로직
        function openManagerModal() {
            document.getElementById('reset-student-id').value = '';
            document.getElementById('manager-modal').style.display = 'block';
        }
        function closeManagerModal() {
            document.getElementById('manager-modal').style.display = 'none';
        }

        async function resetPassword() {
            const studentId = document.getElementById('reset-student-id').value.trim();
            if (!studentId) { alert('학생 아이디를 입력하세요.'); return; }

            if (!confirm(`정말 '${studentId}' 학생의 비밀번호를 '1234'로 초기화하시겠습니까?`)) return;

            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ student_id: studentId })
                });
                const result = await res.json();

                if (res.ok) {
                    alert(result.message);
                    closeManagerModal();
                } else {
                    alert('오류: ' + result.error);
                }
            } catch (e) {
                console.error(e);
                alert('서버 통신 오류');
            }
        }

        // ═══════════ 롤플레이 평가 결과 ═══════════
        async function loadRoleplayEvaluations() {
            const container = document.getElementById('roleplay-view');
            container.innerHTML = '<p class="empty-message">데이터를 불러오는 중...</p>';

            try {
                const res = await fetch('/api/rp-admin/evaluations');
                const data = await res.json();

                if (!data.evaluations?.length) {
                    container.innerHTML = '<p class="empty-message">아직 롤플레이 평가 결과가 없습니다.</p>';
                    return;
                }

                container.innerHTML = '';
                for (const ev of data.evaluations) {
                    const fb = ev.feedback_json || {};
                    const createdAt = ev.created_at ? new Date(ev.created_at).toLocaleString('ko-KR') : '';
                    const score = parseFloat(ev.score) || 0;
                    let scoreColor = '#cc0000';
                    if (score >= 8.5) scoreColor = '#00cc9f';
                    else if (score >= 7.0) scoreColor = '#00cc29';
                    else if (score >= 5.5) scoreColor = '#cccc00';
                    else if (score >= 4.0) scoreColor = '#cc6400';

                    const roomId = `rp-room-${ev.id}`;

                    // ── 방 헤더 (항상 보임, 클릭으로 토글) ──
                    const room = document.createElement('div');
                    room.style.cssText = 'background:#2c2f33; border:1px solid #3a3c41; border-radius:10px; margin-bottom:12px; overflow:hidden;';

                    room.innerHTML = `
                        <div onclick="document.getElementById('${roomId}').style.display = document.getElementById('${roomId}').style.display === 'none' ? 'block' : 'none'"
                             style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px; cursor:pointer; user-select:none;">
                            <div>
                                <span style="font-weight:bold; font-size:1.1rem; color:#e0e0e0;">Team ${ev.team_code}</span>
                                <span style="color:#999; margin-left:12px; font-size:0.9rem;">${ev.scenario_title}</span>
                                <span style="color:#666; margin-left:12px; font-size:0.85rem;">${createdAt}</span>
                                <div style="color:#888; font-size:0.85rem; margin-top:4px;">👥 ${ev.team_members} · 반: ${ev.class_name || '-'}</div>
                            </div>
                            <span style="font-size:1.8rem; font-weight:bold; color:${scoreColor};">${score}<span style="font-size:0.9rem; color:#888;">/10</span></span>
                        </div>
                        <div id="${roomId}" style="display:none; padding:0 20px 20px; border-top:1px solid #3a3c41;">
                            ${buildRpDetail(fb, ev)}
                        </div>
                    `;
                    container.appendChild(room);
                }
            } catch (e) {
                container.innerHTML = '<p class="empty-message">오류: ' + e.message + '</p>';
            }
        }

        function buildRpDetail(fb, ev) {
            const goal = fb.goal_contribution || {};
            const vocab = fb.vocabulary || {};
            const grammar = fb.grammar || {};
            const natural = fb.naturalness || {};

            const usedExpr = vocab.used_expressions?.length
                ? vocab.used_expressions.map(e => `<span style="background:#2d4a2d; color:#69db7c; padding:2px 8px; border-radius:4px; font-size:0.85rem; margin:2px;">${e}</span>`).join(' ')
                : '<span style="color:#666;">없음</span>';
            const missedExpr = vocab.missed_opportunities?.length
                ? vocab.missed_opportunities.map(e => `<span style="background:#4a2d2d; color:#ff8787; padding:2px 8px; border-radius:4px; font-size:0.85rem; margin:2px;">${e}</span>`).join(' ')
                : '<span style="color:#666;">없음</span>';
            const grammarErrors = grammar.errors?.length
                ? grammar.errors.map(e => `<div style="color:#ffa94d; font-size:0.85rem; margin:2px 0;">⚠️ ${e}</div>`).join('')
                : '<span style="color:#666;">없음</span>';

            // 대화 로그
            let chatHtml = '<p style="color:#666; text-align:center;">대화 기록 없음</p>';
            if (ev.conversation_log) {
                const lines = ev.conversation_log.split('\n').filter(l => l.trim());
                chatHtml = lines.map(line => {
                    if (line.includes('] 학생:')) {
                        const text = line.split('] 학생:')[1]?.trim() || '';
                        return `<div style="text-align:right; margin:8px 0;"><span style="background:#7289da; color:#fff; padding:6px 12px; border-radius:12px; font-size:0.85rem; display:inline-block; max-width:75%;">${text}</span></div>`;
                    } else if (line.includes('] NPC:')) {
                        const text = line.split('] NPC:')[1]?.trim() || '';
                        return `<div style="text-align:left; margin:8px 0;"><span style="background:#1a1d2e; border:1px solid #444; color:#e0e0e0; padding:6px 12px; border-radius:12px; font-size:0.85rem; display:inline-block; max-width:75%;">${text}</span></div>`;
                    }
                    return '';
                }).join('');
            }

            return `
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px;">
                    <div style="background:#1a1d2e; padding:12px; border-radius:8px; border-left:3px solid #ff6b6b;">
                        <div style="color:#ff6b6b; font-size:0.8rem; margin-bottom:4px;">🎯 목표 달성</div>
                        <div style="font-size:1.2rem; font-weight:bold; color:#e0e0e0;">${goal.score || 0}/${3.0}</div>
                        <div style="color:#aaa; font-size:0.85rem; margin-top:4px;">${goal.detail || ''}</div>
                    </div>
                    <div style="background:#1a1d2e; padding:12px; border-radius:8px; border-left:3px solid #51cf66;">
                        <div style="color:#51cf66; font-size:0.8rem; margin-bottom:4px;">📚 어휘/표현</div>
                        <div style="font-size:1.2rem; font-weight:bold; color:#e0e0e0;">${vocab.score || 0}/${3.0}</div>
                        <div style="color:#aaa; font-size:0.85rem; margin-top:4px;">${vocab.detail || ''}</div>
                    </div>
                    <div style="background:#1a1d2e; padding:12px; border-radius:8px; border-left:3px solid #fcc419;">
                        <div style="color:#fcc419; font-size:0.8rem; margin-bottom:4px;">✏️ 문법</div>
                        <div style="font-size:1.2rem; font-weight:bold; color:#e0e0e0;">${grammar.score || 0}/${2.0}</div>
                        <div style="color:#aaa; font-size:0.85rem; margin-top:4px;">${grammar.detail || ''}</div>
                    </div>
                    <div style="background:#1a1d2e; padding:12px; border-radius:8px; border-left:3px solid #74c0fc;">
                        <div style="color:#74c0fc; font-size:0.8rem; margin-bottom:4px;">💬 자연스러움</div>
                        <div style="font-size:1.2rem; font-weight:bold; color:#e0e0e0;">${natural.score || 0}/${2.0}</div>
                        <div style="color:#aaa; font-size:0.85rem; margin-top:4px;">${natural.detail || ''}</div>
                    </div>
                </div>
                <div style="margin-top:12px;">
                    <div style="color:#69db7c; font-size:0.85rem; font-weight:bold;">✅ 사용한 표현</div>
                    <div style="display:flex; flex-wrap:wrap; gap:4px; margin-top:4px;">${usedExpr}</div>
                </div>
                <div style="margin-top:8px;">
                    <div style="color:#ff8787; font-size:0.85rem; font-weight:bold;">❌ 놓친 표현</div>
                    <div style="display:flex; flex-wrap:wrap; gap:4px; margin-top:4px;">${missedExpr}</div>
                </div>
                <div style="margin-top:8px;">
                    <div style="color:#ffa94d; font-size:0.85rem; font-weight:bold;">⚠️ 문법 오류</div>
                    <div style="margin-top:4px;">${grammarErrors}</div>
                </div>
                <div style="margin-top:12px; background:#2d1f1f; padding:12px; border-radius:8px; border:1px solid #5c3a3a;">
                    <div style="color:#ff8787; font-size:0.85rem; font-weight:bold; margin-bottom:6px;">📋 종합 평가</div>
                    <div style="color:#e0e0e0; font-size:0.9rem;">${fb.summary_for_teacher || ''}</div>
                </div>
                <div style="margin-top:12px;">
                    <div style="color:#74c0fc; font-size:0.85rem; font-weight:bold; margin-bottom:8px;">💬 전체 대화</div>
                    <div style="max-height:400px; overflow-y:auto; padding:12px; background:#111320; border-radius:8px; border:1px solid #2a2d3e;">
                        ${chatHtml}
                    </div>
                </div>
            `;
        }

    </script>

    <div id="manager-modal" class="modal">
        <div class="modal-content">
            <h3 style="color: white; margin-top: 0; margin-bottom: 20px; text-align: center;">Gestione Studenti</h3>
            <p style="color: #b9bbbe; font-size: 0.9rem; margin-bottom: 15px;">
                비밀번호를 분실한 학생의 ID를 입력하세요.<br>
                비밀번호가 <strong>'1234'</strong>로 초기화됩니다.
            </p>
            
            <label style="color: #b9bbbe;">ID Studente (학생 아이디)</label>
            <input type="text" id="reset-student-id" class="modal-input" placeholder="예: mario">
            
            <button class="check-btn" style="width:100%; margin-top: 10px; background-color: #e74c3c;" onclick="resetPassword()">초기화 (Reset)</button>
            <button class="check-btn" style="width:100%; background-color: #555; margin-top: 10px;" onclick="closeManagerModal()">닫기</button>
        </div>
    </div>
</body>
</html>
