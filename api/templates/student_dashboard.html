<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Aula di Coreano</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- 기본 스타일 (Dark Mode) --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #1e2124;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
        }
        
        /* 상단 네비게이션 */
        nav {
            background-color: #282c34;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #202225;
        }
        .nav-title { font-size: 1.2rem; font-weight: bold; color: #fff; }
        .nav-user { font-size: 0.95rem; color: #b9bbbe; }
        .logout-btn {
            background-color: #f04747;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
            font-size: 0.85rem;
        }

        /* 메인 컨테이너 */
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }

        /* 탭 네비게이션 */
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #40444b; }
        .tab-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            color: #b9bbbe;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }
        .tab-btn:hover { color: #fff; }
        .tab-btn.active {
            color: #7289da;
            border-bottom: 3px solid #7289da;
            margin-bottom: -2px;
        }

        /* [추가] 기록 탭 내부 필터 버튼 스타일 */
        .sub-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .sub-tab-btn {
            padding: 8px 16px;
            background-color: #23272a;
            border: 1px solid #40444b;
            color: #b9bbbe;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .sub-tab-btn:hover { background-color: #2c2f33; color: white; }
        .sub-tab-btn.active {
            background-color: #7289da;
            color: white;
            border-color: #7289da;
        }

        /* 탭 콘텐츠 영역 */
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Tab 1: Overview 스타일 --- */
        .stat-card {
            background-color: #2c2f33;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #23272a;
        }

        /* [추가] 점수 카드 3분할 스타일 */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background-color: #2c2f33;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #23272a;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .stat-title { font-size: 1rem; color: #b9bbbe; margin-bottom: 10px; font-weight: bold; }
        .stat-score { font-size: 2.5rem; font-weight: bold; color: #fff; }
        
        /* 점수별 포인트 색상 */
        .stat-score.trans { color: #3498db; } /* 파랑 */
        .stat-score.comp { color: #2ecc71; }  /* 초록 */
        .stat-score.speak { color: #f1c40f; } /* 노랑 */

        .score-display { font-size: 3.5rem; font-weight: bold; color: #2ecc71; margin: 10px 0; }
        .action-btn {
            background-color: #7289da;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }

        /* --- Tab 2: 학습 시작 스타일 --- */
        .start-box {
            background-color: #2c2f33;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background-color: #202225;
            border: 1px solid #40444b;
            color: white;
            border-radius: 5px;
            font-size: 1rem;
        }
        .start-quiz-btn {
            width: 100%;
            padding: 15px;
            background-color: #27ae60;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* --- Tab 3: 기록 카드 스타일 (우리가 디자인한 것) --- */
        .record-card {
            background-color: #2c2f33;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #23272a;
            position: relative;
        }
        
        /* 뱃지 스타일 */
        .status-badge {
            position: static; 
            padding: 3px 12px; 
            border-radius: 20px;
            font-size: 0.7rem; 
            font-weight: bold;
            display: inline-flex; 
            align-items: center; 
            gap: 3px;
            white-space: nowrap;
        }
        .status-badge.pending { background-color: rgba(230, 126, 34, 0.15); color: #e67e22; border: 1px solid #e67e22; }
        .status-badge.checked { background-color: rgba(39, 174, 96, 0.15); color: #2ecc71; border: 1px solid #2ecc71; }

        .recognized-text {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffffff;
            margin-top: 10px;
            line-height: 1.5;
        }

        .header-row { 
            display: flex; 
            justify-content: space-between;
            align-items: flex-start; 
            margin-bottom: 15px; 
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .score-circle {
            width: 50px; 
            height: 50px; 
            border-radius: 50%;
            background-color: #23272a; 
            border: 3px solid #f1c40f;
            display: flex; 
            justify-content: center; 
            align-items: center;
            font-size: 1.2rem; 
            font-weight: bold; 
            color: #fff;
            flex-shrink: 0;
        }
        .quiz-title { 
            font-weight: bold; 
            font-size: 1.1rem; 
            color: white; 
            margin: 2px 0 4px 0;
            line-height: 1.2;
        }

        .header-label {
            font-size: 0.85rem;
            color: #7289da; /* 포인트 컬러 */
            font-weight: bold;
            text-transform: uppercase; /* 대문자 변환 */
        }

        .date-info { color: #99aab5; font-size: 0.9rem; }

        .content-box {
            background-color: #202225;
            padding: 15px; border-radius: 8px;
            margin-bottom: 15px; color: #e0e0e0;
        }
        .content-label { color: #7289da; font-size: 0.85rem; margin-bottom: 8px; font-weight: bold; }
        
        /* 피드백 박스 */
        .teacher-feedback-box {
            background-color: #2f3136;
            border-left: 4px solid #2ecc71;
            padding: 15px; border-radius: 4px; margin-top: 15px;
        }
        .teacher-label { color: #2ecc71; font-weight: bold; margin-bottom: 5px; }
        
        /* 모달 (정보 수정) */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 1000; }
        .modal-content { 
            background: #2c2f33; 
            width: 90%; 
            max-width: 400px; 
            margin: 10% auto; 
            padding: 30px; 
            border-radius: 10px; 
            border: 1px solid #444;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background-color: #40444b; /* 어두운 배경 */
            border: 1px solid #202225;
            color: #e0e0e0; /* 글자색 밝게 */
            border-radius: 5px;
            font-size: 1rem;
            box-sizing: border-box; /* ★ 핵심: 칸이 삐져나가지 않게 함 */
        }
        .modal-input:focus { outline: none; border-color: #7289da; }
        
    </style>
</head>
<body>

<nav>
    <div class="nav-title">Aula di Coreano</div>
    <div class="nav-user">
        Ciao, <span id="user-name-display">{{ student_name }}</span>!
        <button class="logout-btn" onclick="location.href='/logout'">Esci</button>
    </div>
</nav>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('overview')">Overview</button>
        <button class="tab-btn" onclick="openTab('study')">Inizia Quiz</button>
        <button class="tab-btn" onclick="openTab('history')">Cronologia</button>
    </div>

    <div id="overview" class="tab-content active">

        <h2 style="color: white; margin-bottom: 20px; text-align: center;">Il Tuo Progresso (나의 학습 현황)</h2>
        
        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-title">Traduzione (번역)</div>
                <div class="stat-score" id="score-trans">--</div> <p style="font-size: 0.9rem; color: #b9bbbe; margin-top: 5px;">
                    <span id="count-trans">0</span> tentativi (시도)
                </p>
            </div>
            
            <div class="stat-box">
                <div class="stat-title">Comprensione (이해력)</div>
                <div class="stat-score comp" id="score-comp">--</div>
                <p style="font-size: 0.9rem; color: #b9bbbe; margin-top: 5px;">
                    <span id="count-comp">0</span> tentativi (시도)
                </p>
            </div>
            
            <div class="stat-box">
                <div class="stat-title">Parlato (말하기)</div>
                <div class="stat-score speak" id="score-speak">--</div>
                <p style="font-size: 0.9rem; color: #b9bbbe; margin-top: 5px;">
                    <span id="count-speak">0</span> tentativi (시도)
                </p>      
            </div>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <button class="action-btn" onclick="openModal()">✏️ Modifica Profilo (내 정보 수정)</button>
        </div>

    </div>

    <div id="study" class="tab-content">
        <div class="start-box">
            <h2 style="color:white; margin-bottom: 20px;">Seleziona la Lezione</h2>
            
            <select id="class-select">
                <option value="" disabled selected>Scegli la tua classe (반 선택)</option>
                <option value="siena-topik1">TOPIK 1</option>
                <option value="siena-3">3학년 (Triennale 3)</option>
                <option value="siena-master-1">석사 1학년 (Magistrale 1)</option>
                <option value="siena-master-2">석사 2학년 (Magistrale 2)</option>
            </select>

            <select id="type-select">
                <option value="" disabled selected>Tipo di Quiz (유형 선택)</option>
                <option value="translation">Traduzione (번역)</option>
                <option value="comprehension">Comprensione (이해력)</option>
                <option value="speaking">Parlato (말하기)</option>
                <option value="roleplay">🎭 Roleplay (롤플레이)</option>
            </select>

            <button class="start-quiz-btn" onclick="startQuiz()">🚀 Inizia (시작하기)</button>
        </div>
    </div>

    <div id="history" class="tab-content">
       
        <div class="sub-tabs">
            <button class="sub-tab-btn" onclick="filterHistory('comprehension', event)">Comprensione (이해력)</button>
            <button class="sub-tab-btn" onclick="filterHistory('speaking', event)">Parlato (말하기)</button>
            <button class="sub-tab-btn" onclick="filterHistory('roleplay', event)">🎭 Roleplay</button>
        </div>    
        
        <div id="history-list">
            <p style="text-align: center; color: #777; margin-top: 50px;">Caricamento...</p>
        </div>
    </div>
</div>

<div id="edit-modal" class="modal">
    <div class="modal-content">
        <h3 style="color: white; margin-top: 0; margin-bottom: 20px; text-align: center;">Modifica Profilo</h3>
        
        <label style="color: #b9bbbe; font-size: 0.9rem;">Nome Completo</label>
        <input type="text" id="edit-fullname" class="modal-input" placeholder="Nome Completo">
        
        <label style="color: #b9bbbe; font-size: 0.9rem;">Matricola (학번)</label>
        <input type="text" id="edit-student-num" class="modal-input" placeholder="Matricola">
        
        <label style="color: #b9bbbe; font-size: 0.9rem;">Email</label>
        <input type="email" id="edit-email" class="modal-input" placeholder="Email">
        
        <hr style="border: 0; border-top: 1px solid #444; margin: 20px 0;">
        
        <label style="color: #b9bbbe; font-size: 0.9rem;">Nuova Password (변경 시에만 입력)</label>
        <input type="password" id="edit-password" class="modal-input" placeholder="Nuova Password">
        
        <label style="color: #b9bbbe; font-size: 0.9rem;">Conferma Password (비밀번호 확인)</label>
        <input type="password" id="edit-confirm-password" class="modal-input" placeholder="Ripeti Nuova Password">
        
        <button class="action-btn" style="width:100%; margin-top: 10px;" onclick="submitProfileUpdate()">Salva (저장)</button>
        <button class="action-btn" style="width:100%; background-color:#555; margin-top:10px;" onclick="closeModal()">Annulla (취소)</button>
    </div>
</div>

<script>
    // 탭 전환 함수
    function openTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        
        // 탭 버튼 활성화 스타일 찾기 (간략화)
        const btns = document.querySelectorAll('.tab-btn');
        if(tabName === 'overview') btns[0].classList.add('active');
        if(tabName === 'study') btns[1].classList.add('active');
        if(tabName === 'history') btns[2].classList.add('active');
    }

    // 초기 데이터 로드
    document.addEventListener('DOMContentLoaded', loadDashboardData);

    let currentUserInfo = {}; // 수정용

    async function loadDashboardData() {
        try {
            const res = await fetch('/api/student-dashboard-data');
            const data = await res.json();

            if (data.error) { alert('Errore: ' + data.error); return; }

            // 1. Overview
            if (data.trans_stats) {
                const el = document.getElementById('score-trans');
                el.textContent = data.trans_stats.avg;
                el.style.color = data.trans_stats.color; // ★ 색상 적용
                document.getElementById('count-trans').textContent = data.trans_stats.count; // ★ 횟수 적용
            }

            if (data.comp_stats) {
                const el = document.getElementById('score-comp');
                el.textContent = data.comp_stats.avg;
                el.style.color = data.comp_stats.color;
                document.getElementById('count-comp').textContent = data.comp_stats.count;
            }

            if (data.speak_stats) {
                const el = document.getElementById('score-speak');
                el.textContent = data.speak_stats.avg;
                el.style.color = data.speak_stats.color;
                document.getElementById('count-speak').textContent = data.speak_stats.count;
            }

            currentUserInfo = data.user_info; // 저장해둠

            // 2. History (말하기 + 이해력 합쳐서 최신순 정렬 필요하면 여기서 처리)
            // 현재는 백엔드에서 각각 최신순으로 옴. 단순하게 합쳐서 보여줌.
            const historyContainer = document.getElementById('history-list');
            historyContainer.innerHTML = '';

            // 말하기 카드 생성
            data.speaking_logs.forEach(log => {
                const card = createSpeakingCard(log);
                historyContainer.appendChild(card);
            });

            // 이해력 카드 생성
            data.comprehension_logs.forEach(log => {
                const card = createComprehensionCard(log);
                historyContainer.appendChild(card);
            });

            if (data.speaking_logs.length === 0 && data.comprehension_logs.length === 0) {
                historyContainer.innerHTML = '<p style="text-align:center; color:#777;">Nessuna attività recente.</p>';
            }

        } catch (e) {
            console.error(e);
        }
    }

    // 🎤 말하기 카드 생성 함수
    function createSpeakingCard(log) {
        const div = document.createElement('div');
        div.className = 'record-card type-speaking';
        
        const badgeClass = log.is_checked ? 'checked' : 'pending';
        const badgeText = log.is_checked ? '✅ Visto' : '⏳ Attesa';
        const titleText = log.title || '(No Title)';
        const profFeedback = log.teacher_feedback ? 
            `<div class="teacher-feedback-box"><div class="teacher-label">👨‍🏫 Instructor's Comment</div><p style="white-space: pre-wrap; line-height: 1.6;">${log.teacher_feedback}</p></div>` : '';

        div.innerHTML = `

            <div class="header-row">
                <div class="header-left">
                    <div class="score-circle" style="border-color: ${log.rating_color};">${log.ai_analysis_json.score}</div>
                    <div>
                        <div class="header-label">Situazione</div>
                        <div class="quiz-title">${titleText}</div>
                        <div class="date-info">${log.created_at}</div>
                    </div>
                </div>
                <div class="status-badge ${badgeClass}"><span>${badgeText}</span></div>
            </div>

            <div class="content-box" style="border-left: 3px solid #7289da;">
                <div class="content-label">📖 Situazione (상황)</div>
                <p style="font-size:0.95rem; color:#e0e0e0; margin-bottom: 15px; line-height: 1.5;">${log.situation_description}</p>
                <div class="content-label" style="color: #fff;">💬 Cosa devi dire (지시문)</div>
                <p style="font-weight:bold; color: #fff; font-size: 1rem;">"${log.required_expression}"</p>
            </div>

            <div class="content-box">
                <div class="content-label">LA TUA RISPOSTA (Audio)</div>
                <audio controls src="${log.audio_file_url}" style="width:100%; margin-bottom:5px;"></audio>
                <div class="recognized-text">
                    <span style="color: #999; font-size: 0.9rem; font-weight: normal;">Trascrizione:</span><br>
                    ${log.recognized_korean_text}
                </div>
            </div>

            <div class="content-box" style="border-left: 3px solid #3498db;">
                <div class="content-label" style="color: #3498db;">RISPOSTA CORRETTA</div>
                <p style="font-weight:bold;">${log.expected_korean_answer}</p>
            </div>

            <div style="margin-top:10px; color:#b9bbbe; font-size:0.9rem; white-space: pre-wrap; line-height: 1.6;"><strong>🤖 AI Feedback:</strong> ${log.ai_analysis_json.feedback}
            </div>
            ${profFeedback}

        `;
        return div;
    }

    // 🧠 이해력 카드 생성 함수
    function createComprehensionCard(log) {
        const div = document.createElement('div');
        div.className = 'record-card type-comprehension';
        
        const badgeClass = log.is_checked ? 'checked' : 'pending';
        const badgeText = log.is_checked ? '✅ Visto' : '⏳ Attesa';
        const titleText = log.title || '(No Title)';
        const profFeedback = log.teacher_feedback ? 
            `<div class="teacher-feedback-box"><div class="teacher-label">👨‍🏫 Instructor's Comment</div><p style="white-space: pre-wrap; line-height: 1.6;">${log.teacher_feedback}</p></div>` : '';

        div.innerHTML = `
            <div class="header-row">
                <div class="header-left">
                    <div class="score-circle" style="border-color: ${log.rating_color};">${log.ai_analysis_json.score}</div>
                    <div>
                        <div class="header-label">Dialogo</div>
                        <div class="quiz-title">${titleText}</div>
                        <div class="date-info">${log.created_at}</div>
                    </div>
                </div>
                <div class="status-badge ${badgeClass}"><span>${badgeText}</span></div>
            </div>

            <div class="content-box">
                <div class="content-label">🔊 DIALOGO ORIGINALE</div>
                <audio controls src="${log.audio_file_path}" style="width:100%; margin-bottom:10px;"></audio>
                <div style="white-space: pre-line; color: #b9bbbe; font-size:0.9rem;">${log.korean_dialogue}</div>
            </div>
            <div class="content-box">
                <div class="content-label">IL TUO RIASSUNTO</div>
                <p>${log.student_answer}</p>
            </div>
            <div style="margin-top:10px; color:#b9bbbe; font-size:0.9rem; white-space: pre-wrap; line-height: 1.6;"><strong>🤖 AI Feedback:</strong> ${log.ai_analysis_json.feedback}
            </div>
            ${profFeedback}
        `;
        return div;
    }

    // 퀴즈 시작 (Tab 2)
    async function startQuiz() {
        const className = document.getElementById('class-select').value;
        const quizType = document.getElementById('type-select').value;

        if (!className || !quizType) {
            alert('Seleziona sia la classe che il tipo di quiz!');
            return;
        }

        if (quizType === 'roleplay') {
        window.location.href = `/roleplay-lobby?class_name=${encodeURIComponent(className)}`;
        return;
        }

        const res = await fetch('/api/start-quiz', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ class_name: className, quiz_type: quizType })
        });
        
        if (res.ok) {
            window.location.href = '/quiz'; // 문제 풀이 화면으로 이동
        }
    }

    // 정보 수정 모달 관련
    function openModal() {
        document.getElementById('edit-fullname').value = currentUserInfo.full_name || '';
        document.getElementById('edit-student-num').value = currentUserInfo.student_number || '';
        document.getElementById('edit-email').value = currentUserInfo.school_email || '';
        document.getElementById('edit-password').value = '';
        document.getElementById('edit-modal').style.display = 'block';
    }
    function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }
    
    async function submitProfileUpdate() {
        const fullName = document.getElementById('edit-fullname').value;
        const studentNum = document.getElementById('edit-student-num').value;
        const email = document.getElementById('edit-email').value;
        const password = document.getElementById('edit-password').value;
        const confirmPassword = document.getElementById('edit-confirm-password').value; // 확인 값 가져오기

        // ★ 비밀번호 변경 시 일치 여부 확인 로직 추가
        if (password && password !== confirmPassword) {
            alert('Le password non corrispondono! (비밀번호가 일치하지 않습니다.)');
            return;
        }

        const newData = {
            full_name: fullName,
            student_number: studentNum,
            school_email: email,
            password: password 
        };
        
        try {
            const res = await fetch('/api/update-profile', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(newData)
            });
            
            if (res.ok) {
                alert('Profilo aggiornato! (수정되었습니다)');
                location.reload();
            } else {
                const err = await res.json();
                alert('Errore: ' + (err.error || 'Unknown error'));
            }
        } catch (e) {
            alert('Errore di connessione');
        }
    }

function filterHistory(type, event) {
        // 1. 버튼 스타일 업데이트
        const buttons = document.querySelectorAll('.sub-tab-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        if (event && event.target) {
            event.target.classList.add('active');
        }

        // 2. 롤플레이는 별도 API 로드
        if (type === 'roleplay') {
            loadRoleplayHistory();
            return;
        }

        // 3. 기존 카드 표시/숨김
        const rpContainer = document.getElementById('roleplay-history');
        if (rpContainer) rpContainer.style.display = 'none';
        const allCards = document.querySelectorAll('.record-card');
        allCards.forEach(card => {
            if (type === 'all') {
                card.style.display = 'block';
            } else if (type === 'speaking') {
                card.style.display = card.classList.contains('type-speaking') ? 'block' : 'none';
            } else if (type === 'comprehension') {
                card.style.display = card.classList.contains('type-comprehension') ? 'block' : 'none';
            }
        });
    }

    async function loadRoleplayHistory() {
        document.querySelectorAll('.record-card').forEach(c => c.style.display = 'none');

        let container = document.getElementById('roleplay-history');
        if (!container) {
            container = document.createElement('div');
            container.id = 'roleplay-history';
            document.getElementById('history-list').appendChild(container);
        }
        container.style.display = 'block';
        container.innerHTML = '<p style="text-align:center; color:#777;">Caricamento...</p>';

        try {
            const res = await fetch('/api/rp-student/eval-history');
            const data = await res.json();

            if (!data.evaluations?.length) {
                container.innerHTML = '<p style="text-align:center; color:#777; margin-top:30px;">Nessun risultato di roleplay.</p>';
                return;
            }

            container.innerHTML = '';
            for (const ev of data.evaluations) {
                const card = document.createElement('div');
                card.style.cssText = 'background:#1e2030; border:1px solid #2a2d3e; border-radius:10px; margin-bottom:12px; overflow:hidden;';

                const header = document.createElement('div');
                header.style.cssText = 'padding:14px 18px; cursor:pointer; display:flex; justify-content:space-between; align-items:center;';
                header.innerHTML = `
                    <div>
                        <div style="font-weight:700; color:#e0e0e0;">🎭 ${ev.scenario_title}</div>
                        <div style="font-size:0.8rem; color:#666; margin-top:4px;">${ev.created_at} · Team ${ev.team_code} · 👥 ${ev.team_members}</div>
                    </div>
                    <span class="rp-toggle" style="color:#666; font-size:1.2rem;">▶</span>
                `;

                const detail = document.createElement('div');
                detail.style.cssText = 'display:none; padding:0 18px 18px;';
                let chatHtml = '';
                if (ev.chat_logs?.length) {
                    chatHtml = ev.chat_logs.map(msg => {                        
                        const clean = (msg.text || '').replace(/\[.*?\]/g, '').trim();
                        if (!clean) return '';
                        if (msg.speaker === 'player') {
                            return `<div style="text-align:right; margin:10px 0;"><span style="background:#7289da; color:#fff; padding:8px 14px; border-radius:14px; font-size:0.9rem; display:inline-block; max-width:80%;">${clean}</span></div>`;
                        } else if (msg.speaker === 'npc') {
                            return `<div style="text-align:left; margin:10px 0;"><span style="background:#2c2f33; border:1px solid #444; color:#e0e0e0; padding:8px 14px; border-radius:14px; font-size:0.9rem; display:inline-block; max-width:80%;">${clean}</span></div>`;
                        }
                        return '';
                    }).join('');
                }
                detail.innerHTML = `
                    <div style="max-height:300px; overflow-y:auto; padding:10px; background:#151725; border-radius:8px; border:1px solid #2a2d3e;">
                        ${chatHtml || '<p style="color:#666; text-align:center;">Nessun log disponibile.</p>'}
                    </div>
                `;

                header.addEventListener('click', () => {
                    const isOpen = detail.style.display !== 'none';
                    detail.style.display = isOpen ? 'none' : 'block';
                    header.querySelector('.rp-toggle').textContent = isOpen ? '▶' : '▼';
                });

                card.appendChild(header);
                card.appendChild(detail);
                container.appendChild(card);
            }
        } catch (e) {
            container.innerHTML = '<p style="text-align:center; color:#ff6b6b;">Errore nel caricamento.</p>';
        }
    }
</script>
