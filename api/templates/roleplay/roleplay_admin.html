<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎭 Roleplay Admin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
            font-size: 15px;
        }

        /* ── 헤더 ── */
        .header {
            background: linear-gradient(135deg, #1a1d2e 0%, #0f1117 100%);
            border-bottom: 1px solid #2a2d3e;
            padding: 18px 28px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header h1 { font-size: 22px; font-weight: 700; color: #fff; }
        .header h1 span { color: #7c6ff7; }
        .header-actions a {
            color: #888; text-decoration: none; font-size: 14px;
            padding: 8px 16px; border: 1px solid #333; border-radius: 6px; transition: all 0.2s;
        }
        .header-actions a:hover { color: #fff; border-color: #555; }

        /* ── 탭 네비게이션 ── */
        .tab-nav {
            display: flex; gap: 0; background: #1a1d2e;
            border-bottom: 1px solid #2a2d3e; padding: 0 28px;
        }
        .tab-btn {
            padding: 14px 28px; background: none; border: none; color: #666;
            font-size: 15px; font-weight: 500; cursor: pointer;
            border-bottom: 2px solid transparent; transition: all 0.2s; font-family: inherit;
        }
        .tab-btn:hover { color: #aaa; }
        .tab-btn.active { color: #7c6ff7; border-bottom-color: #7c6ff7; }

        /* ── 메인 컨텐츠 ── */
        .main { padding: 28px; max-width: 1200px; margin: 0 auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ── 카드 ── */
        .card {
            background: #1a1d2e; border: 1px solid #2a2d3e;
            border-radius: 10px; padding: 22px; margin-bottom: 18px;
        }
        .card-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
        }
        .card-title { font-size: 18px; font-weight: 700; color: #fff; }
        .card-id { font-size: 13px; color: #555; font-family: monospace; margin-left: 10px; }
        .card-grid {
            display: grid; grid-template-columns: 110px 1fr; gap: 8px 14px; font-size: 15px;
        }
        .card-grid .label { color: #666; text-align: right; }
        .card-grid .value { color: #ccc; word-break: break-word; }

        .badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .badge-low { background: #2d1f1f; color: #ff6b6b; }
        .badge-medium { background: #2d2a1f; color: #ffd43b; }
        .badge-high { background: #1f2d1f; color: #69db7c; }

        /* ── 폼 ── */
        .form-section { margin-bottom: 22px; }
        .form-section h3 {
            font-size: 14px; color: #7c6ff7; margin-bottom: 12px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
        .form-row.full { grid-template-columns: 1fr; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 13px; color: #888; font-weight: 500; }
        .form-group input, .form-group textarea, .form-group select {
            background: #0f1117; border: 1px solid #2a2d3e; border-radius: 6px;
            padding: 10px 14px; color: #e0e0e0; font-size: 15px; font-family: inherit; transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none; border-color: #7c6ff7;
        }
        .form-group textarea { resize: vertical; min-height: 70px; }

        .checkbox-group { display: flex; gap: 20px; align-items: center; }
        .checkbox-group label {
            display: flex; align-items: center; gap: 6px; font-size: 15px; color: #ccc; cursor: pointer;
        }
        .checkbox-group input[type="checkbox"] { accent-color: #7c6ff7; width: 18px; height: 18px; }

        /* ── 버튼 ── */
        .btn {
            padding: 9px 22px; border: none; border-radius: 6px; font-size: 14px;
            font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.2s;
        }
        .btn-primary { background: #7c6ff7; color: #fff; }
        .btn-primary:hover { background: #6b5ce7; }
        .btn-danger { background: #dc3545; color: #fff; }
        .btn-danger:hover { background: #c82333; }
        .btn-ghost { background: none; border: 1px solid #333; color: #888; }
        .btn-ghost:hover { border-color: #555; color: #ccc; }
        .btn-sm { padding: 5px 12px; font-size: 13px; }
        .btn-row { display: flex; gap: 8px; margin-top: 18px; }
        .card-actions { display: flex; gap: 6px; }

        /* ── 상태 메시지 ── */
        .status-msg { padding: 12px 18px; border-radius: 6px; margin-bottom: 18px; font-size: 14px; display: none; }
        .status-msg.success { display: block; background: #1a2e1a; color: #69db7c; border: 1px solid #2d4a2d; }
        .status-msg.error { display: block; background: #2e1a1a; color: #ff6b6b; border: 1px solid #4a2d2d; }
        .empty-state { text-align: center; padding: 40px; color: #555; font-size: 15px; }

        /* ── 모달 ── */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 12px;
            padding: 28px; width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto;
        }
        .modal h2 { font-size: 20px; color: #fff; margin-bottom: 20px; }

        /* ── PRE 아코디언 ── */
        .accordion-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; background: #1a1d2e; border: 1px solid #2a2d3e;
            border-radius: 8px; cursor: pointer; margin-bottom: 4px; transition: background 0.15s;
        }
        .accordion-header:hover { background: #1f2233; }
        .accordion-header .arrow { font-size: 14px; color: #666; transition: transform 0.2s; }
        .accordion-header.open .arrow { transform: rotate(90deg); }
        .accordion-header .cat-name { font-size: 16px; font-weight: 600; color: #fff; }
        .accordion-header .cat-count { font-size: 13px; color: #666; margin-left: 8px; }
        .accordion-header .cat-guide { font-size: 13px; color: #555; margin-left: 16px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .accordion-body { display: none; padding: 8px 0 12px 0; }
        .accordion-body.open { display: block; }
        .variant-row {
            display: grid; grid-template-columns: 50px 1fr 100px 80px;
            gap: 12px; align-items: center; padding: 10px 18px; font-size: 14px;
            border-bottom: 1px solid #1a1d2e;
        }
        .variant-row:hover { background: #1f2233; }
        .variant-num { color: #666; font-size: 13px; }
        .variant-transcript { color: #e0e0e0; }
        .variant-url a { color: #7c6ff7; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>

<div class="header">
    <h1>🎭 <span>Roleplay</span> Admin</h1>
    <div class="header-actions"><a href="/dashboard">← 교사 대시보드</a></div>
</div>

<div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('scenarios')">시나리오</button>
    <button class="tab-btn" onclick="switchTab('goals')">목표</button>
    <button class="tab-btn" onclick="switchTab('pre')">PRE 녹음</button>
</div>

<div class="main">

<!-- ═══════════════ 탭 1: 시나리오 ═══════════════ -->
<div id="tab-scenarios" class="tab-content active">
    <div id="scenario-status" class="status-msg"></div>

    <div class="card" style="border-color: #7c6ff740;">
        <div class="card-header"><div class="card-title">➕ 새 시나리오 추가</div></div>

        <div class="form-section">
            <h3>기본 정보</h3>
            <div class="form-row">
                <div class="form-group"><label>시나리오 제목 *</label><input type="text" id="sc-title" placeholder="예: 카페 주문"></div>
                <div class="form-group"><label>NPC Voice ID</label><input type="text" id="sc-voice-id" placeholder="ElevenLabs Voice ID"></div>
            </div>
            <div class="form-row full"><div class="form-group"><label>상황 설명</label><textarea id="sc-situation" placeholder="플레이어가 카페에 들어가서..."></textarea></div></div>
            <div class="form-row">
                <div class="form-group"><label>🖼️ 삽화 URL (Cloudflare R2)</label><input type="text" id="sc-illustration-url" placeholder="https://pub-xxx.r2.dev/cafe.png"></div>
                <div class="form-group"><label>🗣️ NPC 말투</label>
                    <select id="sc-speech-style">
                        <option value="격식 존댓말">격식 존댓말 (-습니다체)</option>
                        <option value="비격식 존댓말" selected>비격식 존댓말 (-아/어요체)</option>
                        <option value="반말">반말 (-아/어체)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>NPC 설정</h3>
            <div class="form-row">
                <div class="form-group"><label>NPC 이름</label><input type="text" id="sc-npc-name" placeholder="김수진"></div>
                <div class="form-group"><label>NPC 나이</label><input type="number" id="sc-npc-age" placeholder="25"></div>
            </div>
            <div class="form-row full"><div class="form-group"><label>NPC 직업</label><input type="text" id="sc-npc-job" placeholder="카페 점원"></div></div>
            <div class="form-row full"><div class="form-group"><label>NPC 성격</label><textarea id="sc-npc-personality" placeholder="밝고 친절한 성격..."></textarea></div></div>
            <div class="form-row full"><div class="form-group"><label>NPC 현재 상태</label><textarea id="sc-npc-state" placeholder="오전 10시, 매장이 한가한 상태..."></textarea></div></div>
            <div class="form-row full"><div class="form-group"><label>NPC 도메인 지식 (JSON)</label><textarea id="sc-npc-knowledge" rows="3" placeholder='{"메뉴": [...], "사이즈": [...]}'></textarea></div></div>
        </div>

        <div class="form-section">
            <h3>🎭 플레이어 정보 (도메인 지식에 자동 병합)</h3>
            <div class="form-row">
                <div class="form-group"><label>플레이어 이름</label><input type="text" id="sc-player-name" placeholder="김지호 (빈칸 = 모르는 사이)"></div>
                <div class="form-group"><label>플레이어 역할</label><input type="text" id="sc-player-role" placeholder="단골 손님, 환자, 후배 등"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>호칭 방식</label><input type="text" id="sc-player-address" placeholder="지호씨, 김 대리님 (빈칸 = 호칭 없음)"></div>
                <div class="form-group"><label>관계 설명</label><input type="text" id="sc-player-relationship" placeholder="매일 아침 오는 단골, 1년째 알고 지내는 사이"></div>
            </div>
        </div>

        <div class="form-section">
            <h3>AI 설정</h3>
            <div class="form-row">
                <div class="form-group"><label>Temperature (창의성)</label>
                    <select id="sc-temperature">
                        <option value="0.2">0.2 — 매우 보수적</option>
                        <option value="0.3" selected>0.3 — 보수적 (카페, 접수)</option>
                        <option value="0.5">0.5 — 중간 (선생님, 상사)</option>
                        <option value="0.7">0.7 — 유연 (친구, 토론)</option>
                        <option value="0.9">0.9 — 매우 유연</option>
                    </select>
                </div>
                <div class="form-group"><label>Thinking Level (사고 깊이)</label>
                    <select id="sc-thinking">
                        <option value="LOW" selected>LOW — 빠름 (단순 시나리오)</option>
                        <option value="MEDIUM">MEDIUM — 균형</option>
                        <option value="HIGH">HIGH — 깊음 (복잡한 시나리오)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn btn-primary" onclick="createScenario()">시나리오 저장</button>
            <button class="btn btn-ghost" onclick="clearScenarioForm()">초기화</button>
        </div>
    </div>

    <div id="scenario-list" style="margin-top: 30px;"><div class="empty-state">로딩 중...</div></div>    
</div>

<!-- ═══════════════ 탭 2: 목표 ═══════════════ -->
<div id="tab-goals" class="tab-content">
    <div id="goal-status" class="status-msg"></div>

    <div class="card" style="border-color: #7c6ff740;">
        <div class="card-header"><div class="card-title">➕ 새 목표 추가</div></div>
        <div class="form-row">
            <div class="form-group"><label>목표 제목 *</label><input type="text" id="gl-title" placeholder="카페에서 주문하기"></div>
        </div>
        <div class="form-row full"><div class="form-group"><label>목표 표현</label><input type="text" id="gl-expression" placeholder="주세요, 할게요, 있어요?"></div></div>
        <div class="form-row">
            <div class="form-group"><label>목표 문법</label><input type="text" id="gl-grammar" placeholder="-아/어 주세요"></div>
            <div class="form-group"><label>목표 어휘</label><input type="text" id="gl-vocabulary" placeholder="아메리카노, 라떼"></div>
            <div class="form-group full"><label>대화 목표 (conversation_goal)</label><textarea id="gl-conv-goal" rows="3" placeholder="예: 학생이 카페에서 음료를 주문하고 결제까지 완료한다."></textarea></div>
            <div class="form-group full"><label>NPC 행동 방침 (npc_guidelines)</label><textarea id="gl-npc-guide" rows="3" placeholder="예: 근황에 대해 후속 질문은 1번만 한다. 그 후에는 학생이 질문할 수 있도록 대화를 넘긴다."></textarea></div>
        </div>
        <div class="form-row full"><div class="form-group"><label>🇮🇹 Obiettivo (학생에게 보이는 이탈리아어 목표)</label><textarea id="gl-objective-it" rows="2" placeholder="Ordina una bevanda al bar e paga"></textarea></div></div>
        <div class="btn-row"><button class="btn btn-primary" onclick="createGoal()">목표 저장</button></div>
    </div>

    <div id="goal-list"><div class="empty-state">로딩 중...</div></div>
</div>

<!-- ═══════════════ 탭 3: PRE 녹음 ═══════════════ -->
<div id="tab-pre" class="tab-content">
    <div id="pre-status" class="status-msg"></div>

    <div class="card" style="border-color: #7c6ff740;">
        <div class="card-header"><div class="card-title">➕ PRE 녹음 등록</div></div>
        <div class="form-row">
            <div class="form-group"><label>시나리오 선택 *</label><select id="pre-scenario-id"><option value="">-- 먼저 시나리오를 생성하세요 --</option></select></div>
            <div class="form-group"><label>카테고리 *</label><input type="text" id="pre-category" placeholder="greeting_cafe, boundary_pre 등"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>변형 번호 *</label>
                <select id="pre-variant"><option value="1">변형 1</option><option value="2">변형 2</option><option value="3">변형 3</option></select>
            </div>
            <div class="form-group"><label>Cloudflare R2 URL</label><input type="text" id="pre-url" placeholder="https://pub-xxx.r2.dev/..."></div>
        </div>
        <div class="form-row full"><div class="form-group"><label>가이드 (분석가용)</label><input type="text" id="pre-guide" placeholder="손님이 막 들어왔을 때"></div></div>
        <div class="form-row full"><div class="form-group"><label>대사 텍스트 *</label><input type="text" id="pre-transcript" placeholder="어서오세요~ 주문 도와드릴게요!"></div></div>
        <div class="btn-row"><button class="btn btn-primary" onclick="createPre()">PRE 등록</button></div>
    </div>

    <div id="pre-list"><div class="empty-state">시나리오를 선택하면 해당 PRE 목록이 표시됩니다.</div></div>
</div>

</div><!-- /main -->

<!-- ═══════════════ 수정 모달 (공용) ═══════════════ -->
<div class="modal-overlay" id="edit-modal">
    <div class="modal">
        <h2 id="modal-title">수정</h2>
        <div id="modal-body"></div>
        <div class="btn-row" style="margin-top:20px;">
            <button class="btn btn-primary" id="modal-save-btn">저장</button>
            <button class="btn btn-ghost" onclick="closeModal()">취소</button>
        </div>
    </div>
</div>

<script>
// ═══════════════ 유틸리티 ═══════════════
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    event.target.classList.add('active');
    if (tab === 'scenarios') loadScenarios();
    if (tab === 'goals') loadGoals();
    if (tab === 'pre') loadScenarioDropdown();
}

function showStatus(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg; el.className = `status-msg ${type}`;
    setTimeout(() => { el.className = 'status-msg'; }, 5000);
}

function openModal(title, bodyHtml, onSave) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = bodyHtml;
    document.getElementById('modal-save-btn').onclick = onSave;
    document.getElementById('edit-modal').classList.add('open');
}
function closeModal() { document.getElementById('edit-modal').classList.remove('open'); }

// ═══════════════ 시나리오 ═══════════════
async function loadScenarios() {
    try {
        const res = await fetch('/api/rp-admin/scenarios');
        const data = await res.json();
        if (!data.scenarios?.length) {
            document.getElementById('scenario-list').innerHTML = '<div class="empty-state">아직 시나리오가 없습니다.</div>';
            return;
        }
        let html = '';
        for (const s of data.scenarios) {
            html += `
            <div class="card">
                <div class="card-header">
                    <div><span class="card-title">${s.title}</span><span class="card-id">ID: ${s.id}</span></div>
                    <div class="card-actions">
                        <button class="btn btn-ghost btn-sm" onclick='editScenario(${JSON.stringify(s).replace(/'/g,"&#39;")})'>수정</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteScenario(${s.id})">삭제</button>
                    </div>
                </div>
                <div class="card-grid">
                    <span class="label">상황</span><span class="value">${s.situation||'-'}</span>
                    <span class="label">NPC</span><span class="value">${s.npc_name||'-'} (${s.npc_age||'?'}세, ${s.npc_job||'-'})</span>
                    <span class="label">성격</span><span class="value">${s.npc_personality||'-'}</span>
                    <span class="label">현재 상태</span><span class="value">${s.npc_current_state||'-'}</span>
                    <span class="label">Voice ID</span><span class="value" style="font-family:monospace;font-size:13px;">${s.npc_voice_id||'-'}</span>
                    <span class="label">AI 설정</span><span class="value">Temp: ${s.temperature||0.3} / Think: ${s.thinking_level||'LOW'}</span>
                </div>
            </div>`;
        }
        document.getElementById('scenario-list').innerHTML = html;
    } catch (e) {
        document.getElementById('scenario-list').innerHTML = `<div class="empty-state" style="color:#ff6b6b;">오류: ${e.message}</div>`;
    }
}

function editScenario(s) {
    const knowledge = typeof s.npc_knowledge === 'object' ? JSON.stringify(s.npc_knowledge, null, 2) : (s.npc_knowledge || '');
    
    // 기존 도메인 지식에서 player 정보 분리
    let knowledgeForEdit = typeof s.npc_knowledge === 'object' ? {...s.npc_knowledge} : {};
    if (typeof s.npc_knowledge === 'string') { try { knowledgeForEdit = JSON.parse(s.npc_knowledge); } catch { knowledgeForEdit = {}; } }
    const playerInfo = knowledgeForEdit.player || {};
    delete knowledgeForEdit.player;
    const knowledgeStrForEdit = Object.keys(knowledgeForEdit).length > 0 ? JSON.stringify(knowledgeForEdit, null, 2) : '';

    const html = `
    <div class="form-row"><div class="form-group"><label>제목</label><input id="ed-sc-title" value="${s.title||''}"></div>
    <div class="form-group"><label>Voice ID</label><input id="ed-sc-voice" value="${s.npc_voice_id||''}"></div></div>
    <div class="form-row full"><div class="form-group"><label>상황</label><textarea id="ed-sc-situation">${s.situation||''}</textarea></div></div>
    <div class="form-row">
        <div class="form-group"><label>🖼️ 삽화 URL</label><input id="ed-sc-illustration" value="${s.illustration_url||''}"></div>
        <div class="form-group"><label>🗣️ NPC 말투</label>

                <option value="비격식 존댓말" ${s.speech_style==='비격식 존댓말'||!s.speech_style?'selected':''}>비격식 존댓말</option>
                <option value="반말" ${s.speech_style==='반말'?'selected':''}>반말</option>
            </select>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group"><label>NPC 이름</label><input id="ed-sc-name" value="${s.npc_name||''}"></div>
        <div class="form-group"><label>나이</label><input type="number" id="ed-sc-age" value="${s.npc_age||''}"></div>
    </div>
    <div class="form-row full"><div class="form-group"><label>직업</label><input id="ed-sc-job" value="${s.npc_job||''}"></div></div>
    <div class="form-row full"><div class="form-group"><label>성격</label><textarea id="ed-sc-personality">${s.npc_personality||''}</textarea></div></div>
    <div class="form-row full"><div class="form-group"><label>현재 상태</label><textarea id="ed-sc-state">${s.npc_current_state||''}</textarea></div></div>
    <div class="form-row full"><div class="form-group"><label>도메인 지식 (JSON)</label><textarea id="ed-sc-knowledge" rows="4">${knowledgeStrForEdit}</textarea></div></div>
    <div class="form-row">
        <div class="form-group"><label>Temperature</label>
            <select id="ed-sc-temperature">
                <option value="0.2" ${s.temperature==0.2?'selected':''}>0.2</option>
                <option value="0.3" ${s.temperature==0.3||!s.temperature?'selected':''}>0.3</option>
                <option value="0.5" ${s.temperature==0.5?'selected':''}>0.5</option>
                <option value="0.7" ${s.temperature==0.7?'selected':''}>0.7</option>
                <option value="0.9" ${s.temperature==0.9?'selected':''}>0.9</option>
            </select>
        </div>
        <div class="form-group"><label>Thinking Level</label>
            <select id="ed-sc-thinking">
                <option value="LOW" ${s.thinking_level==='LOW'||!s.thinking_level?'selected':''}>LOW</option>
                <option value="MEDIUM" ${s.thinking_level==='MEDIUM'?'selected':''}>MEDIUM</option>
                <option value="HIGH" ${s.thinking_level==='HIGH'?'selected':''}>HIGH</option>
            </select>
        </div>
    </div>
    <div style="margin-top:14px; padding-top:14px; border-top:1px solid #2a2d3e;">
        <div style="font-size:13px; color:#7c6ff7; margin-bottom:10px; font-weight:500;">🎭 플레이어 정보</div>
        <div class="form-row">
            <div class="form-group"><label>이름</label><input id="ed-sc-player-name" value="${playerInfo.name||''}"></div>
            <div class="form-group"><label>역할</label><input id="ed-sc-player-role" value="${playerInfo.role||''}"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>호칭</label><input id="ed-sc-player-address" value="${playerInfo.how_to_address||''}"></div>
            <div class="form-group"><label>관계</label><input id="ed-sc-player-relationship" value="${playerInfo.relationship||''}"></div>
        </div>
    </div>`;

    openModal(`시나리오 수정 (ID: ${s.id})`, html, async () => {

        // 도메인 지식 + 플레이어 정보 병합
        let editKnowledge = {};
        const editKnStr = document.getElementById('ed-sc-knowledge').value.trim();
        if (editKnStr) { try { editKnowledge = JSON.parse(editKnStr); } catch { showStatus('scenario-status','❌ JSON 형식 오류','error'); return; } }
        const edPlayerName = document.getElementById('ed-sc-player-name').value.trim();
        const edPlayerRole = document.getElementById('ed-sc-player-role').value.trim();
        const edPlayerAddress = document.getElementById('ed-sc-player-address').value.trim();
        const edPlayerRel = document.getElementById('ed-sc-player-relationship').value.trim();
        if (edPlayerName || edPlayerRole || edPlayerAddress || edPlayerRel) {
            editKnowledge.player = {
                name: edPlayerName || null,
                role: edPlayerRole || null,
                how_to_address: edPlayerAddress || null,
                relationship: edPlayerRel || null
            };
        }

        const payload = {
            title: document.getElementById('ed-sc-title').value.trim(),
            situation: document.getElementById('ed-sc-situation').value.trim(),
            illustration_url: document.getElementById('ed-sc-illustration').value.trim() || null,
            speech_style: document.getElementById('ed-sc-speech-style').value,
            npc_name: document.getElementById('ed-sc-name').value.trim(),
            npc_age: parseInt(document.getElementById('ed-sc-age').value) || null,
            npc_job: document.getElementById('ed-sc-job').value.trim(),
            npc_personality: document.getElementById('ed-sc-personality').value.trim(),
            npc_current_state: document.getElementById('ed-sc-state').value.trim(),
            npc_knowledge: Object.keys(editKnowledge).length > 0 ? JSON.stringify(editKnowledge, null, 2) : null,
            npc_voice_id: document.getElementById('ed-sc-voice').value.trim(),
            temperature: parseFloat(document.getElementById('ed-sc-temperature').value),
            thinking_level: document.getElementById('ed-sc-thinking').value            
        };
        try {
            const res = await fetch(`/api/rp-admin/scenarios/${s.id}`, {
                method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (data.success) { closeModal(); showStatus('scenario-status','✅ 수정 완료','success'); loadScenarios(); }
            else showStatus('scenario-status',`❌ ${data.error}`,'error');
        } catch(e) { showStatus('scenario-status',`❌ ${e.message}`,'error'); }
    });
}

async function createScenario() {
    const payload = {
        title: document.getElementById('sc-title').value.trim(),
        situation: document.getElementById('sc-situation').value.trim(),
        illustration_url: document.getElementById('sc-illustration-url').value.trim() || null,
        speech_style: document.getElementById('sc-speech-style').value,
        npc_name: document.getElementById('sc-npc-name').value.trim(),
        npc_age: parseInt(document.getElementById('sc-npc-age').value) || null,
        npc_job: document.getElementById('sc-npc-job').value.trim(),
        npc_personality: document.getElementById('sc-npc-personality').value.trim(),
        npc_current_state: document.getElementById('sc-npc-state').value.trim(),
        npc_voice_id: document.getElementById('sc-voice-id').value.trim(),
        temperature: parseFloat(document.getElementById('sc-temperature').value),
        thinking_level: document.getElementById('sc-thinking').value,
    };
    const knowledgeStr = document.getElementById('sc-npc-knowledge').value.trim();
    let knowledgeObj = {};
    if (knowledgeStr) { try { knowledgeObj = JSON.parse(knowledgeStr); } catch { showStatus('scenario-status','❌ JSON 형식 오류','error'); return; } }

    // 플레이어 정보 → 도메인 지식에 자동 병합
    const playerName = document.getElementById('sc-player-name').value.trim();
    const playerRole = document.getElementById('sc-player-role').value.trim();
    const playerAddress = document.getElementById('sc-player-address').value.trim();
    const playerRelationship = document.getElementById('sc-player-relationship').value.trim();
    if (playerName || playerRole || playerAddress || playerRelationship) {
        knowledgeObj.player = {
            name: playerName || null,
            role: playerRole || null,
            how_to_address: playerAddress || null,
            relationship: playerRelationship || null
        };
    }
    if (Object.keys(knowledgeObj).length > 0) {
        payload.npc_knowledge = JSON.stringify(knowledgeObj, null, 2);
    }

    if (!payload.title) { showStatus('scenario-status','❌ 제목 필수','error'); return; }
    try {
        const res = await fetch('/api/rp-admin/scenarios', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        const data = await res.json();
        if (data.success) { showStatus('scenario-status',`✅ 저장 완료! (ID: ${data.id})`,'success'); clearScenarioForm(); loadScenarios(); }
        else showStatus('scenario-status',`❌ ${data.error}`,'error');
    } catch(e) { showStatus('scenario-status',`❌ ${e.message}`,'error'); }
}

async function deleteScenario(id) {
    if (!confirm(`시나리오 ID ${id} 삭제?\n연결된 PRE도 모두 삭제됩니다.`)) return;
    try {
        const res = await fetch(`/api/rp-admin/scenarios/${id}`, { method:'DELETE' });
        if ((await res.json()).success) { showStatus('scenario-status','✅ 삭제 완료','success'); loadScenarios(); }
    } catch(e) { showStatus('scenario-status',`❌ ${e.message}`,'error'); }
}

function clearScenarioForm() {
    ['sc-title','sc-situation','sc-illustration-url','sc-npc-name','sc-npc-age','sc-npc-job','sc-npc-personality','sc-npc-state','sc-npc-knowledge','sc-voice-id','sc-player-name','sc-player-role','sc-player-address','sc-player-relationship'].forEach(id => document.getElementById(id).value = '');    
    document.getElementById('sc-temperature').value = '0.3';
    document.getElementById('sc-thinking').value = 'LOW';
    document.getElementById('sc-speech-style').value = '비격식 존댓말';
}

async function loadGoals() {
    try {
        const res = await fetch('/api/rp-admin/goals');
        const data = await res.json();
        if (!data.goals?.length) { document.getElementById('goal-list').innerHTML = '<div class="empty-state">아직 목표가 없습니다.</div>'; return; }
        let html = '';
        for (const g of data.goals) {
            html += `
            <div class="card">
                <div class="card-header">
                    <div><span class="card-title">${g.title}</span><span class="card-id">ID: ${g.id}</span></div>
                    <div class="card-actions">
                        <button class="btn btn-ghost btn-sm" onclick='editGoal(${JSON.stringify(g).replace(/'/g,"&#39;")})'>수정</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteGoal(${g.id})">삭제</button>
                    </div>
                </div>
                <div class="card-grid">
                    <span class="label">표현</span><span class="value">${g.target_expression||'-'}</span>
                    <span class="label">문법</span><span class="value">${g.target_grammar||'-'}</span>
                    <span class="label">어휘</span><span class="value">${g.target_vocabulary||'-'}</span>
                    <span class="label">대화 목표</span><span class="value">${g.conversation_goal||'-'}</span>
                    <span class="label">NPC 방침</span><span class="value">${g.npc_guidelines||'-'}</span>
                    <span class="label">🇮🇹 Obiettivo</span><span class="value">${g.objective_it||'-'}</span>
                </div>
            </div>`;
        }
        document.getElementById('goal-list').innerHTML = html;
    } catch(e) { document.getElementById('goal-list').innerHTML = `<div class="empty-state" style="color:#ff6b6b;">${e.message}</div>`; }
}

// ═══════════════ PRE 녹음 (아코디언) ═══════════════
async function loadScenarioDropdown() {
    try {
        const res = await fetch('/api/rp-admin/scenarios');
        const data = await res.json();
        const sel = document.getElementById('pre-scenario-id');
        sel.innerHTML = '<option value="">-- 시나리오 선택 --</option>';
        if (data.scenarios) for (const s of data.scenarios) sel.innerHTML += `<option value="${s.id}">${s.title} (ID: ${s.id})</option>`;

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('pre-scenario-id')?.addEventListener('change', () => {
        const id = document.getElementById('pre-scenario-id').value;
        if (id) loadPreRecordings(id); else document.getElementById('pre-list').innerHTML = '<div class="empty-state">시나리오를 선택하세요.</div>';
    });
});

async function loadPreRecordings(scenarioId) {
    try {
        const res = await fetch(`/api/rp-admin/pre-recordings/${scenarioId}`);
        const data = await res.json();
        if (!data.recordings?.length) {
            document.getElementById('pre-list').innerHTML = '<div class="empty-state">이 시나리오에 등록된 PRE가 없습니다.</div>';
            return;
        }

        // 카테고리별 그룹화
        const groups = {};
        for (const r of data.recordings) {
            if (!groups[r.category]) groups[r.category] = { guide: r.guide_text, items: [] };
            groups[r.category].items.push(r);
        }

        let html = '';
        for (const [cat, group] of Object.entries(groups)) {
            const count = group.items.length;
            html += `
            <div class="accordion-header" onclick="this.classList.toggle('open'); this.nextElementSibling.classList.toggle('open');">
                <div style="display:flex; align-items:center; flex:1; min-width:0;">
                    <span class="arrow">▶</span>
                    <span class="cat-name" style="margin-left:10px;">${cat}</span>
                    <span class="cat-count">(${count}개)</span>
                    <span class="cat-guide">${group.guide || ''}</span>
                </div>
            </div>
            <div class="accordion-body">`;

            for (const r of group.items) {
                const urlLink = r.cloudflare_url ? `<a href="${r.cloudflare_url}" target="_blank">🔗 링크</a>` : '-';
                html += `
                <div class="variant-row">
                    <span class="variant-num">변형 ${r.variant}</span>
                    <span class="variant-transcript">${r.transcript||'-'}</span>
                    <span class="variant-url">${urlLink}</span>
                    <span>
                        <button class="btn btn-ghost btn-sm" onclick='editPre(${JSON.stringify(r).replace(/'/g,"&#39;")})' style="padding:3px 8px;font-size:12px;">수정</button>
                        <button class="btn btn-danger btn-sm" onclick="deletePre(${r.id})" style="padding:3px 8px;font-size:12px;">✕</button>
                    </span>
                </div>`;
            }
            html += '</div>';
        }
        document.getElementById('pre-list').innerHTML = html;
    } catch(e) { document.getElementById('pre-list').innerHTML = `<div class="empty-state" style="color:#ff6b6b;">${e.message}</div>`; }
}

function editPre(r) {
    const html = `
    <div class="form-row"><div class="form-group"><label>카테고리</label><input id="ed-pre-cat" value="${r.category||''}"></div>
    <div class="form-group"><label>변형</label><select id="ed-pre-var"><option value="1" ${r.variant==1?'selected':''}>1</option><option value="2" ${r.variant==2?'selected':''}>2</option><option value="3" ${r.variant==3?'selected':''}>3</option></select></div></div>
    <div class="form-row full"><div class="form-group"><label>가이드</label><input id="ed-pre-guide" value="${r.guide_text||''}"></div></div>
    <div class="form-row full"><div class="form-group"><label>대사</label><input id="ed-pre-transcript" value="${r.transcript||''}"></div></div>
    <div class="form-row full"><div class="form-group"><label>R2 URL</label><input id="ed-pre-url" value="${r.cloudflare_url||''}"></div></div>`;

    openModal(`PRE 수정 (ID: ${r.id})`, html, async () => {
        const payload = {
            category: document.getElementById('ed-pre-cat').value.trim(),
            variant: parseInt(document.getElementById('ed-pre-var').value),
            guide_text: document.getElementById('ed-pre-guide').value.trim() || null,
            transcript: document.getElementById('ed-pre-transcript').value.trim(),
            cloudflare_url: document.getElementById('ed-pre-url').value.trim() || null
        };
        try {
            const res = await fetch(`/api/rp-admin/pre-recordings/${r.id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
            if ((await res.json()).success) {
                closeModal(); showStatus('pre-status','✅ 수정 완료','success');
                loadPreRecordings(document.getElementById('pre-scenario-id').value);
            }
        } catch(e) { showStatus('pre-status',`❌ ${e.message}`,'error'); }
    });
}

async function createPre() {
    const payload = {
        scenario_id: parseInt(document.getElementById('pre-scenario-id').value),
        category: document.getElementById('pre-category').value.trim(),
        variant: parseInt(document.getElementById('pre-variant').value),
        guide_text: document.getElementById('pre-guide').value.trim() || null,
        transcript: document.getElementById('pre-transcript').value.trim(),
        cloudflare_url: document.getElementById('pre-url').value.trim() || null
    };
    if (!payload.scenario_id || !payload.category || !payload.transcript) { showStatus('pre-status','❌ 시나리오, 카테고리, 대사 필수','error'); return; }
    try {
        const res = await fetch('/api/rp-admin/pre-recordings', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        const data = await res.json();
        if (data.success) { showStatus('pre-status',`✅ 등록 완료! (ID: ${data.id})`,'success'); document.getElementById('pre-transcript').value=''; document.getElementById('pre-url').value=''; loadPreRecordings(payload.scenario_id); }
        else showStatus('pre-status',`❌ ${data.error}`,'error');
    } catch(e) { showStatus('pre-status',`❌ ${e.message}`,'error'); }
}

async function deletePre(id) {
    if (!confirm('PRE 삭제?')) return;
    try {
        const res = await fetch(`/api/rp-admin/pre-recordings/${id}`, { method:'DELETE' });
        if ((await res.json()).success) { showStatus('pre-status','✅ 삭제','success'); loadPreRecordings(document.getElementById('pre-scenario-id').value); }
    } catch(e) { showStatus('pre-status',`❌ ${e.message}`,'error'); }
}

// ═══════════════ 초기 로드 ═══════════════
loadScenarios();
</script>
